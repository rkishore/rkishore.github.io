<svg viewBox="0 0 780 440" width="780" height="440" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>MCP is vertical (agent to tools); A2A is horizontal (agent to agent)</title>
  <desc>Two agent boxes, a buyer and a seller, sit side by side and are connected horizontally by an A2A link labeled message/send — these are peers. Each agent also connects vertically downward to its own MCP servers via tools/call: the buyer to a pricing server, the seller to pricing and inventory servers including the secret floor price. MCP is the vertical axis, agent to tools and data. A2A is the horizontal axis, agent to agent. One agent is often both an MCP client, reaching down, and an A2A peer, reaching across.</desc>

  <rect x="0" y="0" width="780" height="440" fill="#FFFFFF"/>

  <defs>
    <marker id="ahPeer" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto-start-reverse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#993C1D"/>
    </marker>
    <marker id="ahDown" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto-start-reverse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#1D9E75"/>
    </marker>
  </defs>

  <style>
    .h    { font-size: 17px; font-weight: 700; fill: #1A1A18; }
    .node { font-size: 15px; font-weight: 700; }
    .sub  { font-size: 10.5px; fill: #5F5E5A; }
    .axis { font-size: 12.5px; font-weight: 700; }
    .mono { font-size: 10.5px; font-weight: 700; font-family: 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace; }
    .cap  { font-size: 11.5px; fill: #5F5E5A; }
  </style>

  <text x="30" y="36" class="h">MCP is vertical; A2A is horizontal</text>

  <!-- Buyer agent -->
  <rect x="96" y="96" width="200" height="76" rx="12" fill="#EEEDFE" stroke="#AFA9EC"/>
  <text x="196" y="130" text-anchor="middle" class="node" fill="#3C3489">buyer agent</text>
  <text x="196" y="150" text-anchor="middle" class="sub">autonomous peer</text>

  <!-- Seller agent -->
  <rect x="484" y="96" width="200" height="76" rx="12" fill="#EEEDFE" stroke="#AFA9EC"/>
  <text x="584" y="130" text-anchor="middle" class="node" fill="#3C3489">seller agent</text>
  <text x="584" y="150" text-anchor="middle" class="sub">autonomous peer</text>

  <!-- A2A horizontal link -->
  <line x1="296" y1="134" x2="484" y2="134" stroke="#993C1D" stroke-width="2.4" marker-start="url(#ahPeer)" marker-end="url(#ahPeer)"/>
  <text x="390" y="122" text-anchor="middle" class="axis" fill="#993C1D">A2A — horizontal</text>
  <text x="390" y="156" text-anchor="middle" class="mono" fill="#993C1D">message/send</text>

  <!-- Buyer MCP down -->
  <line x1="196" y1="172" x2="196" y2="300" stroke="#1D9E75" stroke-width="2.2" marker-end="url(#ahDown)"/>
  <text x="210" y="240" class="mono" fill="#1D9E75">tools/call</text>
  <rect x="96" y="300" width="200" height="70" rx="11" fill="#E1F5EE" stroke="#5DCAA5"/>
  <text x="196" y="330" text-anchor="middle" class="node" fill="#0F6E56">pricing server</text>
  <text x="196" y="350" text-anchor="middle" class="sub">get_market_price …</text>

  <!-- Seller MCP down -->
  <line x1="584" y1="172" x2="584" y2="300" stroke="#1D9E75" stroke-width="2.2" marker-end="url(#ahDown)"/>
  <text x="598" y="240" class="mono" fill="#1D9E75">tools/call</text>
  <rect x="484" y="300" width="200" height="70" rx="11" fill="#E1F5EE" stroke="#5DCAA5"/>
  <text x="584" y="326" text-anchor="middle" class="node" fill="#0F6E56">pricing + inventory</text>
  <text x="584" y="346" text-anchor="middle" class="sub">…incl. the floor price</text>

  <!-- vertical axis label -->
  <text x="30" y="238" class="axis" fill="#1D9E75">MCP</text>
  <text x="30" y="256" class="axis" fill="#1D9E75">vertical</text>

  <!-- caption -->
  <text x="30" y="410" class="cap">One agent is often <tspan font-weight="700" fill="#1A1A18">both</tspan> — an MCP client reaching <tspan font-weight="700" fill="#0F6E56">down</tspan> to tools, and an A2A peer reaching <tspan font-weight="700" fill="#993C1D">across</tspan> to other agents.</text>
</svg>
