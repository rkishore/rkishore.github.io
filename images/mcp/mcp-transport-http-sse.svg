<svg viewBox="0 0 720 380" width="720" height="380" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>The legacy HTTP+SSE transport: two endpoints and one long-lived stream</title>
  <desc>The client on the left talks to two separate server endpoints on the right. First it issues an HTTP GET to the SSE endpoint to open a long-lived Server-Sent Events stream; the stream's first event is an endpoint event that names the POST URL. All server-to-client messages, including every response, travel back down that one persistent SSE stream. The client sends each of its own messages as a separate HTTP POST to the message endpoint. Two endpoints, one always-open stream.</desc>

  <rect x="0" y="0" width="720" height="380" fill="#FFFFFF"/>

  <defs>
    <marker id="ahBlue" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto-start-reverse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2C6BC4"/>
    </marker>
    <marker id="ahGrey" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto-start-reverse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#8A8880"/>
    </marker>
  </defs>

  <style>
    .h    { font-size: 17px; font-weight: 700; fill: #1A1A18; }
    .node { font-size: 15px; font-weight: 700; fill: #444441; }
    .sub  { font-size: 11px; fill: #5F5E5A; }
    .mono { font-size: 12px; font-weight: 700; font-family: 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace; }
    .lbl  { font-size: 11.5px; font-weight: 600; }
    .cap  { font-size: 11px; fill: #5F5E5A; }
    .note { font-size: 10.5px; fill: #888780; }
  </style>

  <text x="36" y="36" class="h">HTTP + SSE (legacy): two endpoints, one long-lived stream</text>

  <!-- Client box (tall, spans both lanes) -->
  <rect x="48" y="104" width="150" height="234" rx="12" fill="#F1EFE8" stroke="#B4B2A9"/>
  <text x="123" y="227" text-anchor="middle" class="node">Client</text>

  <!-- SSE endpoint box -->
  <rect x="500" y="104" width="180" height="80" rx="11" fill="#F1EFE8" stroke="#B4B2A9"/>
  <text x="590" y="138" text-anchor="middle" class="mono" fill="#444441">GET /sse</text>
  <text x="590" y="160" text-anchor="middle" class="sub">SSE stream endpoint</text>

  <!-- POST endpoint box -->
  <rect x="500" y="258" width="180" height="80" rx="11" fill="#F1EFE8" stroke="#B4B2A9"/>
  <text x="590" y="292" text-anchor="middle" class="mono" fill="#444441">POST /messages</text>
  <text x="590" y="314" text-anchor="middle" class="sub">message endpoint</text>

  <!-- Lane A forward: GET opens stream -->
  <text x="349" y="124" text-anchor="middle" class="lbl" fill="#2C6BC4">① GET — open stream</text>
  <line x1="198" y1="134" x2="500" y2="134" stroke="#2C6BC4" stroke-width="1.6" marker-end="url(#ahBlue)"/>

  <!-- Lane A return: the long-lived SSE stream -->
  <line x1="500" y1="160" x2="198" y2="160" stroke="#8A8880" stroke-width="2.4" marker-end="url(#ahGrey)"/>
  <text x="349" y="178" text-anchor="middle" class="cap">SSE stream · every response + notification (server → client)</text>

  <!-- note under SSE box -->
  <text x="590" y="206" text-anchor="middle" class="note">first event: endpoint (names the POST URL)</text>

  <!-- Lane B forward: POST each message -->
  <text x="349" y="290" text-anchor="middle" class="lbl" fill="#2C6BC4">② POST — one per message (client → server)</text>
  <line x1="198" y1="300" x2="500" y2="300" stroke="#2C6BC4" stroke-width="2" marker-end="url(#ahBlue)"/>

  <!-- caption -->
  <text x="360" y="362" text-anchor="middle" class="cap">The SSE stream stays open for the whole session — if it drops, the session is gone.</text>
</svg>
