<svg viewBox="0 0 840 480" width="840" height="480" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>Why MCP integrations scale as N+M instead of N times M</title>
  <desc>Left: without a shared protocol, 3 apps each wire directly to 3 tools, needing 9 (N times M) custom integrations. Right: with MCP as a shared hub, each app and each tool connects once, needing 6 (N plus M) integrations.</desc>

  <rect x="0" y="0" width="840" height="480" fill="#FFFFFF"/>

  <style>
    .title  { font-size: 17px; font-weight: 700; fill: #1A1A18; }
    .sub    { font-size: 12px; fill: #5F5E5A; }
    .lbl    { font-size: 12px; font-weight: 600; }
    .formula{ font-size: 15px; font-weight: 700; }
  </style>

  <!-- ===================== LEFT: WITHOUT MCP ===================== -->
  <rect x="16" y="16" width="394" height="448" rx="14" fill="#F1EFE8"/>
  <text x="36" y="50" class="title">Without MCP</text>
  <text x="36" y="70" class="sub">every app wires to every tool</text>

  <!-- connecting lines (9) : tangle -->
  <g stroke="#D85A30" stroke-width="1.6" opacity="0.75">
    <line x1="128" y1="150" x2="282" y2="150"/>
    <line x1="128" y1="150" x2="282" y2="250"/>
    <line x1="128" y1="150" x2="282" y2="350"/>
    <line x1="128" y1="250" x2="282" y2="150"/>
    <line x1="128" y1="250" x2="282" y2="250"/>
    <line x1="128" y1="250" x2="282" y2="350"/>
    <line x1="128" y1="350" x2="282" y2="150"/>
    <line x1="128" y1="350" x2="282" y2="250"/>
    <line x1="128" y1="350" x2="282" y2="350"/>
  </g>

  <!-- apps -->
  <g>
    <rect x="40" y="128" width="88" height="44" rx="9" fill="#E6F1FB" stroke="#85B7EB"/>
    <text x="84" y="155" text-anchor="middle" class="lbl" fill="#1F4E79">App 1</text>
    <rect x="40" y="228" width="88" height="44" rx="9" fill="#E6F1FB" stroke="#85B7EB"/>
    <text x="84" y="255" text-anchor="middle" class="lbl" fill="#1F4E79">App 2</text>
    <rect x="40" y="328" width="88" height="44" rx="9" fill="#E6F1FB" stroke="#85B7EB"/>
    <text x="84" y="355" text-anchor="middle" class="lbl" fill="#1F4E79">App 3</text>
  </g>
  <!-- tools -->
  <g>
    <rect x="282" y="128" width="88" height="44" rx="9" fill="#FAECE7" stroke="#F0997B"/>
    <text x="326" y="155" text-anchor="middle" class="lbl" fill="#993C1D">Tool A</text>
    <rect x="282" y="228" width="88" height="44" rx="9" fill="#FAECE7" stroke="#F0997B"/>
    <text x="326" y="255" text-anchor="middle" class="lbl" fill="#993C1D">Tool B</text>
    <rect x="282" y="328" width="88" height="44" rx="9" fill="#FAECE7" stroke="#F0997B"/>
    <text x="326" y="355" text-anchor="middle" class="lbl" fill="#993C1D">Tool C</text>
  </g>

  <text x="213" y="430" text-anchor="middle" class="formula" fill="#993C1D">N &#215; M = 3 &#215; 3 = 9</text>

  <!-- ===================== RIGHT: WITH MCP ===================== -->
  <rect x="430" y="16" width="394" height="448" rx="14" fill="#F1EFE8"/>
  <text x="450" y="50" class="title">With MCP</text>
  <text x="450" y="70" class="sub">each side speaks one protocol</text>

  <!-- lines app -> hub (3) and hub -> tool (3) -->
  <g stroke="#1D9E75" stroke-width="1.8">
    <line x1="538" y1="150" x2="600" y2="250"/>
    <line x1="538" y1="250" x2="600" y2="250"/>
    <line x1="538" y1="350" x2="600" y2="250"/>
    <line x1="700" y1="250" x2="734" y2="150"/>
    <line x1="700" y1="250" x2="734" y2="250"/>
    <line x1="700" y1="250" x2="734" y2="350"/>
  </g>

  <!-- apps -->
  <g>
    <rect x="450" y="128" width="88" height="44" rx="9" fill="#E6F1FB" stroke="#85B7EB"/>
    <text x="494" y="155" text-anchor="middle" class="lbl" fill="#1F4E79">App 1</text>
    <rect x="450" y="228" width="88" height="44" rx="9" fill="#E6F1FB" stroke="#85B7EB"/>
    <text x="494" y="255" text-anchor="middle" class="lbl" fill="#1F4E79">App 2</text>
    <rect x="450" y="328" width="88" height="44" rx="9" fill="#E6F1FB" stroke="#85B7EB"/>
    <text x="494" y="355" text-anchor="middle" class="lbl" fill="#1F4E79">App 3</text>
  </g>

  <!-- MCP hub -->
  <rect x="600" y="212" width="100" height="76" rx="12" fill="#534AB7" stroke="#3C3489"/>
  <text x="650" y="246" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">MCP</text>
  <text x="650" y="266" text-anchor="middle" font-size="10.5" fill="#CECBF6">shared protocol</text>

  <!-- tools -->
  <g>
    <rect x="734" y="128" width="88" height="44" rx="9" fill="#FAECE7" stroke="#F0997B"/>
    <text x="778" y="155" text-anchor="middle" class="lbl" fill="#993C1D">Tool A</text>
    <rect x="734" y="228" width="88" height="44" rx="9" fill="#FAECE7" stroke="#F0997B"/>
    <text x="778" y="255" text-anchor="middle" class="lbl" fill="#993C1D">Tool B</text>
    <rect x="734" y="328" width="88" height="44" rx="9" fill="#FAECE7" stroke="#F0997B"/>
    <text x="778" y="355" text-anchor="middle" class="lbl" fill="#993C1D">Tool C</text>
  </g>

  <text x="627" y="430" text-anchor="middle" class="formula" fill="#0F6E56">N + M = 3 + 3 = 6</text>
</svg>
