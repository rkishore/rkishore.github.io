<svg viewBox="0 0 800 440" width="800" height="440" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>RRF promotes consensus: the three documents in both the dense and sparse top lists rise to the fused top three</title>
  <desc>Real results for the query "immune cells driving nasal inflammation." The dense list ranks documents 0, 7, 4, 52, 79 with cosine scores from 0.729 down to 0.612. The sparse list ranks documents 52, 0, 4, 65, 13 with dot-product scores from 12.198 down to 5.317. The dense top document is 0 and the sparse top document is 52 — different. Three documents appear in both lists: 0, 4, and 52. Reciprocal Rank Fusion with k of 60 fuses the two lists and floats exactly those three consensus documents to the top three of the fused ranking: document 0 at 0.0325, document 52 at 0.0320, document 4 at 0.0317. Hand calculation for document 0: it is dense rank 1 and sparse rank 2, so its score is 1 over 61 plus 1 over 62, which equals 0.0325.</desc>

  <rect x="0" y="0" width="800" height="440" fill="#FFFFFF"/>

  <defs>
    <marker id="ahBlue" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto-start-reverse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2C6BC4"/>
    </marker>
  </defs>

  <style>
    .h    { font-size: 16.5px; font-weight: 700; fill: #1A1A18; }
    .colh { font-size: 12px; font-weight: 700; }
    .chip { font-size: 11px; font-weight: 700; font-family: 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace; }
    .sub  { font-size: 9.5px; fill: #5F5E5A; }
    .q    { font-size: 11px; font-weight: 700; font-family: 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace; fill: #993C1D; }
    .note { font-size: 11px; fill: #444441; }
    .key  { font-size: 11px; font-weight: 700; fill: #1F4E79; }
  </style>

  <text x="24" y="30" class="h">RRF floats the consensus documents to the top</text>
  <text x="24" y="50" class="q">query: "immune cells driving nasal inflammation"</text>

  <!-- ===== DENSE column ===== -->
  <text x="95" y="80" text-anchor="middle" class="colh" fill="#3C3489">DENSE · cosine</text>
  <!-- chips: id0 .729, id7 .652, id4 .631, id52 .620, id79 .612 -->
  <rect x="30" y="92"  width="130" height="30" rx="7" fill="#EEEDFE" stroke="#2C6BC4" stroke-width="2"/>
  <text x="42" y="111" class="chip" fill="#3C3489">id 0</text><text x="150" y="111" text-anchor="end" class="chip" fill="#3C3489">0.729</text>
  <rect x="30" y="128" width="130" height="30" rx="7" fill="#F1EFE8" stroke="#B4B2A9"/>
  <text x="42" y="147" class="chip" fill="#5F5E5A">id 7</text><text x="150" y="147" text-anchor="end" class="chip" fill="#5F5E5A">0.652</text>
  <rect x="30" y="164" width="130" height="30" rx="7" fill="#EEEDFE" stroke="#2C6BC4" stroke-width="2"/>
  <text x="42" y="183" class="chip" fill="#3C3489">id 4</text><text x="150" y="183" text-anchor="end" class="chip" fill="#3C3489">0.631</text>
  <rect x="30" y="200" width="130" height="30" rx="7" fill="#EEEDFE" stroke="#2C6BC4" stroke-width="2"/>
  <text x="42" y="219" class="chip" fill="#3C3489">id 52</text><text x="150" y="219" text-anchor="end" class="chip" fill="#3C3489">0.620</text>
  <rect x="30" y="236" width="130" height="30" rx="7" fill="#F1EFE8" stroke="#B4B2A9"/>
  <text x="42" y="255" class="chip" fill="#5F5E5A">id 79</text><text x="150" y="255" text-anchor="end" class="chip" fill="#5F5E5A">0.612</text>

  <!-- ===== SPARSE column ===== -->
  <text x="245" y="80" text-anchor="middle" class="colh" fill="#0F6E56">SPARSE · dot-product</text>
  <rect x="180" y="92"  width="130" height="30" rx="7" fill="#E1F5EE" stroke="#0F6E56" stroke-width="2"/>
  <text x="192" y="111" class="chip" fill="#0F6E56">id 52</text><text x="300" y="111" text-anchor="end" class="chip" fill="#0F6E56">12.198</text>
  <rect x="180" y="128" width="130" height="30" rx="7" fill="#E1F5EE" stroke="#0F6E56" stroke-width="2"/>
  <text x="192" y="147" class="chip" fill="#0F6E56">id 0</text><text x="300" y="147" text-anchor="end" class="chip" fill="#0F6E56">11.592</text>
  <rect x="180" y="164" width="130" height="30" rx="7" fill="#E1F5EE" stroke="#0F6E56" stroke-width="2"/>
  <text x="192" y="183" class="chip" fill="#0F6E56">id 4</text><text x="300" y="183" text-anchor="end" class="chip" fill="#0F6E56">7.578</text>
  <rect x="180" y="200" width="130" height="30" rx="7" fill="#F1EFE8" stroke="#B4B2A9"/>
  <text x="192" y="219" class="chip" fill="#5F5E5A">id 65</text><text x="300" y="219" text-anchor="end" class="chip" fill="#5F5E5A">6.980</text>
  <rect x="180" y="236" width="130" height="30" rx="7" fill="#F1EFE8" stroke="#B4B2A9"/>
  <text x="192" y="255" class="chip" fill="#5F5E5A">id 13</text><text x="300" y="255" text-anchor="end" class="chip" fill="#5F5E5A">5.317</text>

  <!-- RRF box -->
  <rect x="344" y="150" width="86" height="58" rx="11" fill="#E6F1FB" stroke="#85B7EB"/>
  <text x="387" y="175" text-anchor="middle" class="colh" fill="#1F4E79">RRF</text>
  <text x="387" y="193" text-anchor="middle" class="sub">k = 60</text>
  <line x1="310" y1="150" x2="342" y2="172" stroke="#2C6BC4" stroke-width="1.8" marker-end="url(#ahBlue)"/>
  <line x1="310" y1="208" x2="342" y2="186" stroke="#2C6BC4" stroke-width="1.8" marker-end="url(#ahBlue)"/>

  <!-- ===== FUSED column ===== -->
  <text x="515" y="80" text-anchor="middle" class="colh" fill="#1F4E79">FUSED · RRF score</text>
  <rect x="450" y="92"  width="130" height="30" rx="7" fill="#D9E9FA" stroke="#1F4E79" stroke-width="2"/>
  <text x="462" y="111" class="chip" fill="#1F4E79">id 0</text><text x="570" y="111" text-anchor="end" class="chip" fill="#1F4E79">0.0325</text>
  <rect x="450" y="128" width="130" height="30" rx="7" fill="#D9E9FA" stroke="#1F4E79" stroke-width="2"/>
  <text x="462" y="147" class="chip" fill="#1F4E79">id 52</text><text x="570" y="147" text-anchor="end" class="chip" fill="#1F4E79">0.0320</text>
  <rect x="450" y="164" width="130" height="30" rx="7" fill="#D9E9FA" stroke="#1F4E79" stroke-width="2"/>
  <text x="462" y="183" class="chip" fill="#1F4E79">id 4</text><text x="570" y="183" text-anchor="end" class="chip" fill="#1F4E79">0.0317</text>
  <rect x="450" y="200" width="130" height="30" rx="7" fill="#F1EFE8" stroke="#B4B2A9"/>
  <text x="462" y="219" class="chip" fill="#5F5E5A">id 13</text><text x="570" y="219" text-anchor="end" class="chip" fill="#5F5E5A">0.0305</text>
  <rect x="450" y="236" width="130" height="30" rx="7" fill="#F1EFE8" stroke="#B4B2A9"/>
  <text x="462" y="255" class="chip" fill="#5F5E5A">id 65</text><text x="570" y="255" text-anchor="end" class="chip" fill="#5F5E5A">0.0299</text>
  <line x1="430" y1="179" x2="448" y2="150" stroke="#2C6BC4" stroke-width="1.8" marker-end="url(#ahBlue)"/>

  <!-- legend + hand-math -->
  <rect x="608" y="92" width="176" height="60" rx="10" fill="#FBFBF9" stroke="#E4E2DA"/>
  <rect x="620" y="106" width="16" height="16" rx="4" fill="#D9E9FA" stroke="#1F4E79" stroke-width="2"/>
  <text x="644" y="118" class="key">in BOTH lists</text>
  <text x="620" y="140" class="sub">→ promoted to the fused top 3</text>

  <rect x="608" y="164" width="176" height="102" rx="10" fill="#E6F1FB" stroke="#85B7EB"/>
  <text x="620" y="186" class="note">id 0 = dense #1, sparse #2</text>
  <text x="620" y="212" class="chip" fill="#1F4E79">1/(60+1) + 1/(60+2)</text>
  <text x="620" y="234" class="chip" fill="#1F4E79">= 1/61 + 1/62</text>
  <text x="620" y="256" class="chip" fill="#0F6E56">= 0.0325  ✓</text>

  <!-- takeaway -->
  <rect x="24" y="300" width="760" height="52" rx="12" fill="#E1F5EE" stroke="#5DCAA5"/>
  <text x="404" y="324" text-anchor="middle" class="colh" fill="#0F6E56">Dense #1 (id 0) ≠ sparse #1 (id 52) — but the three docs in BOTH lists (0, 4, 52) take the fused top 3</text>
  <text x="404" y="341" text-anchor="middle" class="sub">consensus promotion, on real data — no score normalization anywhere</text>
</svg>
