<svg viewBox="0 0 800 470" width="800" height="470" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>HNSW: greedy descent through a layered proximity graph</title>
  <desc>A layered graph with three levels stacked top to bottom. The top layer, Layer 2, has only a few nodes joined by long-range links and an entry point on the left. The middle layer, Layer 1, has more nodes and medium-length links. The bottom layer, Layer 0, contains every node joined by short links. The search starts at the entry point at the top and greedily hops along a layer toward the node closest to the query, then drops down one layer and repeats, converging in Layer 0 on the nearest neighbor beside the query point. The path is highlighted, and dashed vertical arrows show the descent between layers. The result: a few hundred comparisons instead of scanning every vector.</desc>

  <rect x="0" y="0" width="800" height="470" fill="#FFFFFF"/>

  <defs>
    <marker id="ahBlue" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto-start-reverse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2C6BC4"/>
    </marker>
  </defs>

  <style>
    .h    { font-size: 17px; font-weight: 700; fill: #1A1A18; }
    .band { fill: #FBFBF9; stroke: #E4E2DA; }
    .lbl  { font-size: 11px; font-weight: 700; fill: #8A8880; }
    .edge { stroke: #C9C7BF; stroke-width: 1.3; }
    .node { fill: #EEEDFE; stroke: #AFA9EC; stroke-width: 1.4; }
    .pnode{ fill: #EEEDFE; stroke: #2C6BC4; stroke-width: 2.4; }
    .path { stroke: #2C6BC4; stroke-width: 2.6; fill: none; }
    .desc { stroke: #2C6BC4; stroke-width: 2; stroke-dasharray: 5 4; fill: none; }
    .tag  { font-size: 11px; font-weight: 700; }
    .cap  { font-size: 11.5px; fill: #5F5E5A; }
  </style>

  <text x="24" y="32" class="h">HNSW: start at the top, greedily hop toward the query, drop a layer, repeat</text>

  <!-- ===== Layer bands ===== -->
  <rect x="40" y="52" width="720" height="86" rx="12" class="band"/>
  <text x="54" y="70" class="lbl">Layer 2 — few nodes, long hops</text>

  <rect x="40" y="152" width="720" height="96" rx="12" class="band"/>
  <text x="54" y="170" class="lbl">Layer 1 — medium links</text>

  <rect x="40" y="262" width="720" height="112" rx="12" class="band"/>
  <text x="54" y="280" class="lbl">Layer 0 — every node, short hops</text>

  <!-- ===== intra-layer edges (grey, drawn first) ===== -->
  <!-- L2 -->
  <line x1="100" y1="108" x2="340" y2="108" class="edge"/>
  <line x1="340" y1="108" x2="560" y2="108" class="edge"/>
  <!-- L1 -->
  <line x1="140" y1="212" x2="300" y2="212" class="edge"/>
  <line x1="300" y1="212" x2="440" y2="212" class="edge"/>
  <line x1="440" y1="212" x2="560" y2="212" class="edge"/>
  <line x1="560" y1="212" x2="680" y2="212" class="edge"/>
  <line x1="140" y1="212" x2="440" y2="212" class="edge"/>
  <!-- L0 -->
  <line x1="100" y1="330" x2="175" y2="330" class="edge"/>
  <line x1="175" y1="330" x2="250" y2="330" class="edge"/>
  <line x1="250" y1="330" x2="325" y2="330" class="edge"/>
  <line x1="325" y1="330" x2="400" y2="330" class="edge"/>
  <line x1="400" y1="330" x2="475" y2="330" class="edge"/>
  <line x1="475" y1="330" x2="550" y2="330" class="edge"/>
  <line x1="550" y1="330" x2="620" y2="330" class="edge"/>
  <line x1="620" y1="330" x2="680" y2="330" class="edge"/>
  <line x1="680" y1="330" x2="740" y2="330" class="edge"/>
  <line x1="250" y1="330" x2="400" y2="330" class="edge"/>
  <line x1="475" y1="330" x2="620" y2="330" class="edge"/>

  <!-- ===== search path (blue) ===== -->
  <!-- L2 hops -->
  <line x1="110" y1="108" x2="328" y2="108" class="path" marker-end="url(#ahBlue)"/>
  <line x1="352" y1="108" x2="548" y2="108" class="path" marker-end="url(#ahBlue)"/>
  <!-- descend to L1 -->
  <line x1="560" y1="120" x2="560" y2="200" class="desc" marker-end="url(#ahBlue)"/>
  <!-- L1 hop -->
  <line x1="572" y1="212" x2="668" y2="212" class="path" marker-end="url(#ahBlue)"/>
  <!-- descend to L0 -->
  <line x1="680" y1="224" x2="680" y2="318" class="desc" marker-end="url(#ahBlue)"/>
  <!-- L0 hop to nearest neighbor -->
  <line x1="668" y1="330" x2="632" y2="330" class="path" marker-end="url(#ahBlue)"/>

  <!-- ===== nodes ===== -->
  <!-- Layer 2 -->
  <circle cx="100" cy="108" r="9" class="pnode"/>
  <circle cx="340" cy="108" r="8" class="pnode"/>
  <circle cx="560" cy="108" r="8" class="pnode"/>
  <text x="100" y="90" text-anchor="middle" class="tag" fill="#1F4E79">entry</text>

  <!-- Layer 1 -->
  <circle cx="140" cy="212" r="7" class="node"/>
  <circle cx="300" cy="212" r="7" class="node"/>
  <circle cx="440" cy="212" r="7" class="node"/>
  <circle cx="560" cy="212" r="8" class="pnode"/>
  <circle cx="680" cy="212" r="8" class="pnode"/>

  <!-- Layer 0 -->
  <circle cx="100" cy="330" r="7" class="node"/>
  <circle cx="175" cy="330" r="7" class="node"/>
  <circle cx="250" cy="330" r="7" class="node"/>
  <circle cx="325" cy="330" r="7" class="node"/>
  <circle cx="400" cy="330" r="7" class="node"/>
  <circle cx="475" cy="330" r="7" class="node"/>
  <circle cx="550" cy="330" r="7" class="node"/>
  <circle cx="680" cy="330" r="8" class="pnode"/>
  <circle cx="740" cy="330" r="7" class="node"/>
  <!-- nearest neighbor (green) -->
  <circle cx="620" cy="330" r="8.5" fill="#5DCAA5" stroke="#0F6E56" stroke-width="2"/>
  <text x="620" y="312" text-anchor="middle" class="tag" fill="#0F6E56">nearest</text>

  <!-- query marker (orange diamond) -->
  <polygon points="600,352 610,362 600,372 590,362" fill="#F0997B" stroke="#993C1D" stroke-width="1.6"/>
  <text x="600" y="390" text-anchor="middle" class="tag" fill="#993C1D">query</text>

  <!-- caption -->
  <text x="24" y="428" class="cap">Exact k-NN scans <tspan font-weight="700" fill="#1A1A18">every</tspan> vector (O(N)). HNSW visits a handful per layer — a few hundred comparisons, not millions.</text>
  <text x="24" y="450" class="cap">Sparse long-range links up top jump you close fast; dense short links at the bottom refine to the true nearest neighbor.</text>
</svg>
